<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Complete</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 2rem auto; padding: 0 1rem; color: #111; text-align: center; }
    .ok { font-size: 3rem; color: #15803d; }
    .amount { font-size: 1.5rem; font-weight: 700; margin: 1rem 0; }
    .meta { color: #555; }
  </style>
</head>
<body>
  <div class="ok">✓</div>
  <h1>Payment successful</h1>
  <div class="amount">{{amount_display}}</div>
  <p class="meta">Reference: {{reference}}</p>
</body>
</html>
