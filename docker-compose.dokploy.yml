# Dokploy → Compose file: docker-compose.dokploy.yml
# Domain → service `relay`, port 8080
#
# Joins `dokploy-network` so DATABASE_URL / REDIS_URL hostnames
# (Dokploy Postgres + Redis services) resolve.

services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      PORT: "8080"
      INVOICE_PAY_BASE_URL: ${INVOICE_PAY_BASE_URL:?INVOICE_PAY_BASE_URL is required}
      PAWAPAY_API_TOKEN: ${PAWAPAY_API_TOKEN:?PAWAPAY_API_TOKEN is required}
      PAWAPAY_BASE_URL: ${PAWAPAY_BASE_URL:-https://api.pawapay.io}
      FALLBACK_GATEWAY: ${FALLBACK_GATEWAY:-pawapay}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:?WEBHOOK_SIGNING_SECRET is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      WALLET_SEED_DEFAULTS_PATH: config/wallet_seed_defaults.json
      PAY_PAGE_RATE_LIMIT: ${PAY_PAGE_RATE_LIMIT:-10}
      RUST_LOG: ${RUST_LOG:-payment_relay=info,tower_http=info}
    ports:
      - "8080"
    networks:
      - dokploy-network

  webhook-worker:
    build:
      context: ./workers
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:?WEBHOOK_SIGNING_SECRET is required}
    depends_on:
      - relay
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
