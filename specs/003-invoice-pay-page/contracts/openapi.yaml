openapi: 3.1.0
info:
  title: Payment Relay API (v0.3 — Invoice Pay Page)
  version: 0.3.0
  description: |
    Extends v0.2 with public payer-facing pay page routes.
    The pay UI is a React SPA (`frontend/`) served at `/pay/{reference}`.
    Invoice data and payment submission use JSON at `/api/pay/{reference}`.

servers:
  - url: http://localhost:8080

tags:
  - name: pay-page
    description: Public payer routes (no API key)

paths:
  /pay/{reference}:
    get:
      tags: [pay-page]
      summary: Serve React pay page shell
      description: |
        Returns the built React SPA index.html. The client loads invoice data
        from `GET /api/pay/{reference}`. Requires `frontend/dist` from
        `npm run build`.
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
            example: INV_RTL_a1b2c3d4
      responses:
        '200':
          description: React SPA HTML shell
          content:
            text/html:
              schema:
                type: string
        '503':
          description: Frontend not built

  /api/pay/{reference}:
    get:
      tags: [pay-page]
      summary: Load invoice for pay page
      description: |
        Returns invoice details, provider options, and CSRF/idempotency tokens
        for an open invoice. No authentication required; reference acts as
        capability token.
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
            example: INV_RTL_a1b2c3d4
      responses:
        '200':
          description: Invoice pay page data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayPageResponse'
        '404':
          description: Unknown or expired reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayErrorResponse'

    post:
      tags: [pay-page]
      summary: Submit payment from pay page
      description: Initiates mobile-money deposit for an open invoice.
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaySubmitRequest'
      responses:
        '200':
          description: Payment accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaySubmitResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayErrorResponse'
        '404':
          description: Unknown reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayErrorResponse'
        '409':
          description: Invoice not payable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayErrorResponse'

components:
  schemas:
    ProviderOption:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
          example: MTN_MOMO_ZMB
        label:
          type: string
          example: MTN MoMo Zambia

    PayPageResponse:
      type: object
      required:
        - reference
        - amount
        - amount_display
        - currency
        - country
        - status
        - expires_at
        - payable
        - providers
      properties:
        reference:
          type: string
        amount:
          type: integer
          format: int64
        amount_display:
          type: string
          example: ZMW 50.00
        currency:
          type: string
        country:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, paid, expired, cancelled]
        expires_at:
          type: string
          format: date-time
        payable:
          type: boolean
        form_token:
          type: string
          description: HMAC CSRF token (present when payable)
        idempotency_key:
          type: string
          format: uuid
          description: UUID generated per page load (present when payable)
        providers:
          type: array
          items:
            $ref: '#/components/schemas/ProviderOption'

    PaySubmitRequest:
      type: object
      required: [phone, provider, idempotency_key, form_token]
      properties:
        phone:
          type: string
          example: "260763456789"
        provider:
          type: string
          example: MTN_MOMO_ZMB
        idempotency_key:
          type: string
          format: uuid
        form_token:
          type: string

    PaySubmitResponse:
      type: object
      required: [status, message, amount_display, reference]
      properties:
        status:
          type: string
          enum: [paid]
        message:
          type: string
        amount_display:
          type: string
        reference:
          type: string

    PayErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string

    InvoicePaidWebhook:
      type: object
      properties:
        event:
          type: string
          enum: [invoice.paid]
        invoice_id:
          type: string
          format: uuid
        reference:
          type: string
        amount:
          type: integer
          format: int64
        currency:
          type: string
        country:
          type: string
        transaction_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [paid]
