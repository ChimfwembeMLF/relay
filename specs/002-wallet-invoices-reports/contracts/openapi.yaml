openapi: 3.1.0
info:
  title: Payment Relay API (v0.2 — Invoices & Reports)
  version: 0.2.0
  description: |
    Extends v0.1 with wallet auto-seeding, pay-in invoices with QR codes, and reports.
    Base paths from 001 remain unchanged.

servers:
  - url: http://localhost:8080

tags:
  - name: systems
  - name: invoices
  - name: reports
  - name: payments

paths:
  /systems:
    post:
      tags: [systems]
      summary: Register system (auto-seeds wallets)
      description: Creates system and seeds wallets per enabled countries using defaults + optional overrides.
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/CreateSystemRequest'
                - type: object
                  properties:
                    wallet_seeds:
                      type: array
                      items:
                        $ref: '#/components/schemas/WalletSeedOverride'
      responses:
        '200':
          description: System created with wallets seeded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CreateSystemResponse'
                  - type: object
                    properties:
                      wallets_seeded:
                        type: integer

  /invoices:
    post:
      tags: [invoices]
      summary: Create invoice with QR code
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponse'
    get:
      tags: [invoices]
      summary: List invoices
      security:
        - ApiKeyAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, paid, expired, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvoiceResponse'

  /invoices/{reference}:
    get:
      tags: [invoices]
      summary: Get invoice by reference
      security:
        - ApiKeyAuth: []
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponse'

  /invoices/{id}/collect:
    post:
      tags: [invoices]
      summary: Collect payment for open invoice (deposit)
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectInvoiceRequest'
      responses:
        '200':
          description: Invoice paid, wallet credited
        '402':
          description: Invoice expired or cancelled
        '409':
          description: Invoice already paid (returns linked transaction)

  /invoices/{id}/cancel:
    post:
      tags: [invoices]
      summary: Cancel open invoice
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invoice cancelled

  /reports/transactions:
    get:
      tags: [reports]
      summary: Transaction report
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/ReportFrom'
        - $ref: '#/components/parameters/ReportTo'
        - $ref: '#/components/parameters/ReportFormat'
        - name: status
          in: query
          schema:
            type: string
        - name: detail
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: JSON summary or CSV export

  /reports/wallets:
    get:
      tags: [reports]
      summary: Wallet balance report
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/ReportFrom'
        - $ref: '#/components/parameters/ReportTo'
        - $ref: '#/components/parameters/ReportFormat'
      responses:
        '200':
          description: JSON summary or CSV export

  /reports/invoices:
    get:
      tags: [reports]
      summary: Invoice report
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/ReportFrom'
        - $ref: '#/components/parameters/ReportTo'
        - $ref: '#/components/parameters/ReportFormat'
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: JSON summary or CSV export

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    ReportFrom:
      name: from
      in: query
      required: true
      schema:
        type: string
        format: date-time
    ReportTo:
      name: to
      in: query
      required: true
      schema:
        type: string
        format: date-time
    ReportFormat:
      name: format
      in: query
      schema:
        type: string
        enum: [json, csv]
        default: json

  schemas:
    WalletSeedOverride:
      type: object
      required: [country, currency, amount]
      properties:
        country:
          type: string
        currency:
          type: string
        amount:
          type: integer
          format: int64

    CreateSystemRequest:
      type: object
      required: [name, prefix, enabled_countries]
      properties:
        name:
          type: string
        prefix:
          type: string
        enabled_countries:
          type: array
          items:
            type: string
        webhook_url:
          type: string

    CreateSystemResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        prefix:
          type: string
        api_key:
          type: string
        wallets_seeded:
          type: integer

    CreateInvoiceRequest:
      type: object
      required: [amount, currency, country]
      properties:
        amount:
          type: integer
          format: int64
          minimum: 1
        currency:
          type: string
        country:
          type: string
        description:
          type: string
        expires_in_hours:
          type: integer
          default: 24
          minimum: 1
          maximum: 720

    InvoiceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reference:
          type: string
        system_id:
          type: string
          format: uuid
        amount:
          type: integer
        currency:
          type: string
        country:
          type: string
        status:
          type: string
          enum: [open, paid, expired, cancelled]
        description:
          type: string
        expires_at:
          type: string
          format: date-time
        paid_at:
          type: string
          format: date-time
          nullable: true
        transaction_id:
          type: string
          format: uuid
          nullable: true
        qr_url:
          type: string
        qr_code_png_base64:
          type: string
          description: data:image/png;base64,... for embedding in PDF/UI

    CollectInvoiceRequest:
      type: object
      required: [payment_method, idempotency_key]
      properties:
        payment_method:
          type: object
        idempotency_key:
          type: string

    ReportSummary:
      type: object
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        total_count:
          type: integer
        total_amount:
          type: integer
        by_status:
          type: object
          additionalProperties:
            type: object
            properties:
              count:
                type: integer
              amount:
                type: integer
