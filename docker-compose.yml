services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: payment_relay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Optional: BullMQ worker (webhook delivery). Start with: docker compose up webhook-worker
  webhook-worker:
    build:
      context: ./workers
    environment:
      REDIS_URL: redis://redis:6379
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-dev-secret-change-me}
    depends_on:
      - redis
    profiles:
      - workers

volumes:
  postgres_data:
  redis_data:
